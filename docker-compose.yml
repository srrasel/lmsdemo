services:
  db:
    image: mysql:8.1
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: elearning
      # Do not set MYSQL_USER to 'root' (MySQL 8.1 restriction)
      # To create a non-root user, set MYSQL_USER to a different name and MYSQL_PASSWORD.
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3306:3306"

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./elearning
      dockerfile: Dockerfile
    working_dir: /var/www/html/core
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: elearning
      DB_USERNAME: root
      DB_PASSWORD: root
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - db
      - redis
    volumes:
      - ./elearning:/var/www/html
      - backend_vendor:/var/www/html/core/vendor
      - backend_node_modules:/var/www/html/core/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/usr/src/app
      - frontend_node_modules:/usr/src/app/node_modules
    working_dir: /usr/src/app
    ports:
      - "3000:3000"
    environment:
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-this-secret
      NEXT_PUBLIC_API_URL: http://backend:8000/api
    depends_on:
      - backend

volumes:
  dbdata:
  backend_vendor:
  backend_node_modules:
  frontend_node_modules:
