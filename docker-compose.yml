services:
  db:
    image: mysql:8.1
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-elearning}
      # Do not set MYSQL_USER to 'root' (MySQL 8.1 restriction)
      # To create a non-root user, set MYSQL_USER to a different name and MYSQL_PASSWORD.
    volumes:
      - dbdata:/var/lib/mysql
      - ./elearning/install/database.sql:/docker-entrypoint-initdb.d/01-database.sql:ro

  redis:
    image: redis:7
    restart: unless-stopped

  backend:
    build:
      context: ./elearning
      dockerfile: Dockerfile
    working_dir: /var/www/html/core
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://127.0.0.1:8000}
      ASSET_URL: ${ASSET_URL:-http://127.0.0.1:8000}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-*}
      SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-false}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-elearning}
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - db
      - redis
    volumes:
      - ./elearning/assets:/var/www/html/assets
      - backend_storage:/var/www/html/core/storage

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://houseoftheelect.org}
        NEXT_PUBLIC_SITE_TITLE: ${NEXT_PUBLIC_SITE_TITLE:-houseoftheelect}
        NEXT_PUBLIC_AUTH_PREFIX: ${NEXT_PUBLIC_AUTH_PREFIX:-/}
    working_dir: /usr/src/app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://houseoftheelect.org}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-this-secret}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://houseoftheelect.org}
      API_URL_INTERNAL: http://backend:8000
    depends_on:
      - backend

volumes:
  dbdata:
  backend_storage:
